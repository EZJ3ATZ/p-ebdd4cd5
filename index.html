<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#ff7eb3" />
<title>Matheus 💗 Manu</title>
<style>
  :root{
    --skin:#f7c9a3; --skin2:#f0b88e;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; overflow:hidden; }
  body{
    font-family:-apple-system,"Segoe UI",Roboto,system-ui,sans-serif;
    background:linear-gradient(160deg,#ffd9ec 0%,#ffc2dd 30%,#d6c4ff 70%,#bcd4ff 100%);
    background-size:200% 200%;
    animation:sky 14s ease infinite;
    color:#5b2a45; user-select:none; -webkit-user-select:none;
    touch-action:none;
  }
  @keyframes sky{0%{background-position:0% 0%}50%{background-position:100% 100%}100%{background-position:0% 0%}}

  /* corações de fundo */
  .bg-heart{ position:fixed; bottom:-40px; font-size:26px; opacity:.18; animation:floatUp linear infinite; z-index:0; }
  @keyframes floatUp{ to{ transform:translateY(-115vh) rotate(40deg); opacity:0; } }

  #scene{ position:fixed; inset:0; z-index:1; }

  /* ---------- topo ---------- */
  #hud{ position:fixed; top:0; left:0; right:0; z-index:5; padding:14px 16px calc(env(safe-area-inset-top) + 4px); text-align:center; pointer-events:none; }
  #title{ font-size:23px; font-weight:800; letter-spacing:.5px; text-shadow:0 2px 0 #fff6; }
  #title small{ font-size:18px; }
  #subtitle{ margin-top:4px; font-size:14px; font-weight:600; min-height:18px; opacity:.92; transition:opacity .3s; }
  #meterWrap{ margin:10px auto 0; width:min(80%,300px); height:14px; background:#ffffff66; border-radius:20px; overflow:hidden; box-shadow:inset 0 1px 3px #0002; }
  #meter{ height:100%; width:0%; border-radius:20px; background:linear-gradient(90deg,#ff8fb1,#ff4e8a,#ff2d6f); transition:width .15s ease; }
  #meterTxt{ font-size:12px; font-weight:700; margin-top:3px; opacity:.8; }

  /* ---------- personagens ---------- */
  .character{ position:absolute; width:122px; cursor:grab; touch-action:none; z-index:3; will-change:left,top; }
  .character.grabbing{ cursor:grabbing; z-index:4; }
  .char-bob{ animation:bob 3s ease-in-out infinite; }
  .character:nth-of-type(2) .char-bob{ animation-delay:-1.4s; }
  @keyframes bob{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-9px) } }
  .scene.together .char-bob{ animation:hugbob 1s ease-in-out infinite; }
  @keyframes hugbob{ 0%,100%{ transform:translateY(0) scale(1) } 50%{ transform:translateY(-5px) scale(1.04) } }
  .char-tilt{ transition:transform .45s cubic-bezier(.34,1.56,.64,1); }
  .scene.together #matheus  .char-tilt{ transform:rotate(10deg); }
  .scene.together #manu .char-tilt{ transform:rotate(-10deg); }
  .toon{ width:100%; height:auto; display:block; overflow:visible; filter:drop-shadow(0 8px 8px #0002); }
  .name{ text-align:center; font-weight:800; font-size:14px; margin-top:-6px; color:#fff; text-shadow:0 1px 3px #c14b7e; }

  /* membros / traços */
  .limb{ stroke-width:12; stroke-linecap:round; fill:none; }
  .leg{ stroke-width:17; stroke-linecap:round; fill:none; }
  .sleeve{ stroke-width:18; stroke-linecap:round; fill:none; }
  .brow{ stroke:#3a2433; stroke-width:2.8; stroke-linecap:round; fill:none; }
  .mouth-sad{ stroke:#b3324f; stroke-width:3; fill:none; stroke-linecap:round; }
  .mouth-happy{ fill:#c0395a; }
  .cheek{ fill:#ff9bb0; opacity:.8; }
  .tear{ fill:#8fd6ff; }

  /* troca de expressão */
  .face-happy,.arms-hug{ display:none; }
  .scene.together .face-happy,.scene.together .arms-hug{ display:block; }
  .scene.together .face-sad,.scene.together .arms-normal{ display:none; }

  @keyframes drip{ 0%{transform:translateY(0);opacity:0} 18%{opacity:.95} 100%{transform:translateY(30px);opacity:0} }
  .tear{ animation:drip 1.25s ease-in infinite; transform-box:fill-box; transform-origin:center; }
  .tear.t2{ animation-delay:.62s; }

  /* coração grande no encontro */
  #bigHeart{ position:absolute; z-index:2; font-size:120px; transform:translate(-50%,-50%) scale(0); opacity:0; transition:opacity .4s; pointer-events:none; filter:drop-shadow(0 4px 10px #ff4e8a55); }
  .scene.together #bigHeart{ opacity:.9; animation:beat 1s ease-in-out infinite; }
  @keyframes beat{ 0%,100%{ transform:translate(-50%,-50%) scale(.92) } 50%{ transform:translate(-50%,-50%) scale(1.12) } }

  /* partículas */
  .pop{ position:absolute; z-index:4; pointer-events:none; font-size:26px; animation:pop 1.5s ease-out forwards; }
  @keyframes pop{ 0%{ transform:translate(-50%,-50%) scale(.4); opacity:0 } 15%{ opacity:1 } 100%{ transform:translate(-50%,-260%) scale(1.2); opacity:0 } }

  /* dica */
  #hint{ position:fixed; bottom:calc(env(safe-area-inset-bottom) + 18px); left:0; right:0; text-align:center; z-index:5; font-size:14px; font-weight:700; color:#fff; text-shadow:0 1px 4px #c14b7e; pointer-events:none; animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{opacity:.65} 50%{opacity:1} }
  #hint.hide{ opacity:0; transition:opacity .6s; }
</style>
</head>
<body>

  <div id="hud">
    <div id="title">Matheus <small>💗</small> Manu</div>
    <div id="subtitle">Toque e arraste os dois...</div>
    <div id="meterWrap"><div id="meter"></div></div>
    <div id="meterTxt">amorômetro</div>
  </div>

  <div id="scene" class="scene">
    <div id="bigHeart">💗</div>

    <div class="character" id="matheus">
      <div class="char-bob"><div class="char-tilt"></div></div>
      <div class="name">Matheus</div>
    </div>

    <div class="character" id="manu">
      <div class="char-bob"><div class="char-tilt"></div></div>
      <div class="name">Manu</div>
    </div>
  </div>

  <div id="hint">💡 Arraste os dois para pertinho 💕</div>

<script>
/* ---------- desenho dos personagens ---------- */
function buildToon(o){
  const long = o.long;
  return `
  <svg viewBox="0 0 200 285" class="toon" aria-hidden="true">
    <ellipse cx="100" cy="272" rx="54" ry="9" fill="#0000001f"/>
    ${long?`<path d="M56 96 Q50 58 100 54 Q150 58 144 96 L148 180 Q141 190 129 181 L129 112 Q100 97 71 112 L71 181 Q59 190 52 180 Z" fill="${o.hair}"/>`:''}
    ${long
      ?`<path class="limb" stroke="${o.skin}" d="M90 212 L86 250"/><path class="limb" stroke="${o.skin}" d="M110 212 L114 250"/>`
      :`<path class="leg" stroke="${o.pants}" d="M88 206 L84 250"/><path class="leg" stroke="${o.pants}" d="M112 206 L116 250"/>`}
    <ellipse cx="83" cy="254" rx="13" ry="7" fill="${o.shoe}"/>
    <ellipse cx="117" cy="254" rx="13" ry="7" fill="${o.shoe}"/>
    ${long
      ?`<path d="M70 150 Q62 122 100 119 Q138 122 130 150 L150 214 Q100 231 50 214 Z" fill="${o.outfit}"/>`
      :`<path d="M64 150 Q60 122 100 119 Q140 122 136 150 L143 209 Q100 221 57 209 Z" fill="${o.outfit}"/>`}

    <g class="arms arms-normal">
      <path class="limb" stroke="${o.skin}" d="M72 152 Q60 178 58 198"/>
      <path class="limb" stroke="${o.skin}" d="M128 152 Q140 178 142 198"/>
      <path class="sleeve" stroke="${o.outfit}" d="M73 150 L66 166"/>
      <path class="sleeve" stroke="${o.outfit}" d="M127 150 L134 166"/>
      <circle cx="57" cy="200" r="6.5" fill="${o.skin}"/>
      <circle cx="143" cy="200" r="6.5" fill="${o.skin}"/>
    </g>
    <g class="arms arms-hug">
      <path class="limb" stroke="${o.skin}" d="M72 150 Q54 132 44 116"/>
      <path class="limb" stroke="${o.skin}" d="M128 150 Q146 132 156 116"/>
      <path class="sleeve" stroke="${o.outfit}" d="M74 150 L64 139"/>
      <path class="sleeve" stroke="${o.outfit}" d="M126 150 L136 139"/>
      <circle cx="43" cy="114" r="6.5" fill="${o.skin}"/>
      <circle cx="157" cy="114" r="6.5" fill="${o.skin}"/>
    </g>

    <rect x="93" y="118" width="14" height="13" rx="6" fill="${o.skin2}"/>
    <circle cx="68" cy="94" r="7" fill="${o.skin}"/>
    <circle cx="132" cy="94" r="7" fill="${o.skin}"/>
    <circle cx="100" cy="92" r="33" fill="${o.skin}"/>

    ${long
      ?`<path d="M67 96 Q60 58 100 56 Q140 58 133 96 Q120 80 100 80 Q80 80 67 96Z" fill="${o.hair}"/>
        <path d="M100 53 L83 44 L86 61 Z" fill="${o.bow}"/><path d="M100 53 L117 44 L114 61 Z" fill="${o.bow}"/><circle cx="100" cy="53" r="4.5" fill="${o.bow2}"/>`
      :`<path d="M66 96 Q58 56 100 54 Q142 56 134 96 Q118 78 100 78 Q82 78 66 96Z" fill="${o.hair}"/>`}

    <g class="face face-sad">
      <path class="brow" d="M78 84 L91 80"/>
      <path class="brow" d="M122 84 L109 80"/>
      <circle cx="86" cy="92" r="4" fill="#2a2433"/>
      <circle cx="114" cy="92" r="4" fill="#2a2433"/>
      <path class="mouth-sad" d="M91 114 Q100 108 109 114"/>
      <ellipse class="tear t1" cx="86" cy="99" rx="2.6" ry="3.7"/>
      <ellipse class="tear t2" cx="114" cy="99" rx="2.6" ry="3.7"/>
    </g>
    <g class="face face-happy">
      <ellipse class="cheek" cx="78" cy="103" rx="7" ry="4.3"/>
      <ellipse class="cheek" cx="122" cy="103" rx="7" ry="4.3"/>
      <circle cx="86" cy="91" r="4.7" fill="#2a2433"/>
      <circle cx="114" cy="91" r="4.7" fill="#2a2433"/>
      <circle cx="87.7" cy="89.3" r="1.5" fill="#fff"/>
      <circle cx="115.7" cy="89.3" r="1.5" fill="#fff"/>
      <path class="mouth-happy" d="M86 106 Q100 122 114 106 Q100 112 86 106 Z"/>
    </g>
  </svg>`;
}

const matheus  = document.getElementById('matheus');
const manu = document.getElementById('manu');
matheus.querySelector('.char-tilt').innerHTML = buildToon({
  skin:'#f4c19a', skin2:'#e9b288', hair:'#3a2a1d', outfit:'#4aa3df', pants:'#33405e', shoe:'#2b2b36'
});
manu.querySelector('.char-tilt').innerHTML = buildToon({
  long:true, skin:'#f9cfa9', skin2:'#efbf95', hair:'#42291c', outfit:'#ff7eb3', shoe:'#ff5fa2', bow:'#ff4e8a', bow2:'#ffd6e8'
});

/* ---------- cena ---------- */
const scene  = document.getElementById('scene');
const meter  = document.getElementById('meter');
const subtitle = document.getElementById('subtitle');
const bigHeart = document.getElementById('bigHeart');
const hint = document.getElementById('hint');

const THRESHOLD = 134;            // distância (px) p/ ficarem juntos
let together = false;

const MSG_SAD = ['Cadê você? 🥺','Sinto sua falta...','Tô tão sozinho 💧','Volta pra mim 😢','Aproxima a gente! 👉👈'];
const MSG_HAPPY = ['Te amo! 💖','Juntinhos pra sempre 💕','Você é meu mundo 🌍❤️','Meu amor 🥰','Pra sempre nós dois 💑','Coração batendo forte 💓'];

function centerOf(el){
  return { x: el.offsetLeft + el.offsetWidth/2, y: el.offsetTop + el.offsetHeight*0.5 };
}

function update(){
  const a = centerOf(matheus), b = centerOf(manu);
  const dist = Math.hypot(a.x-b.x, a.y-b.y);
  const maxD = Math.hypot(scene.clientWidth, scene.clientHeight);
  const love = Math.max(0, Math.min(1, 1 - dist/(maxD*0.9)));

  const nowTogether = dist < THRESHOLD;
  meter.style.width = (nowTogether ? 100 : Math.round(love*92)) + '%';

  if(nowTogether !== together){
    together = nowTogether;
    scene.classList.toggle('together', together);
    setMsg();
    if(together){
      const mid = { x:(a.x+b.x)/2, y:(a.y+b.y)/2 };
      bigHeart.style.left = mid.x+'px';
      bigHeart.style.top  = (mid.y-10)+'px';
      navigator.vibrate && navigator.vibrate([40,30,60]);
      chime();
    }
  }
}

let msgTimer;
function setMsg(){
  clearInterval(msgTimer);
  const pool = together ? MSG_HAPPY : MSG_SAD;
  let i = Math.floor(Math.random()*pool.length);
  const show = ()=>{ subtitle.style.opacity=0; setTimeout(()=>{ subtitle.textContent = pool[i%pool.length]; subtitle.style.opacity=1; i++; },200); };
  show();
  msgTimer = setInterval(show, 2600);
}

/* partículas de coração enquanto juntos */
const EMO = ['💕','❤️','💖','💗','💞','🥰'];
setInterval(()=>{
  if(!together) return;
  const a = centerOf(matheus), b = centerOf(manu);
  const p = document.createElement('div');
  p.className = 'pop';
  p.textContent = EMO[Math.floor(Math.random()*EMO.length)];
  p.style.left = ((a.x+b.x)/2 + (Math.random()*70-35)) + 'px';
  p.style.top  = ((a.y+b.y)/2 - 30) + 'px';
  scene.appendChild(p);
  setTimeout(()=>p.remove(), 1500);
}, 320);

/* som suave no encontro */
let _ac;
function chime(){
  try{
    _ac = _ac || new (window.AudioContext||window.webkitAudioContext)();
    if(_ac.state === 'suspended') _ac.resume();
    const ac = _ac;
    [659,880].forEach((f,n)=>{
      const o = ac.createOscillator(), g = ac.createGain();
      o.type='sine'; o.frequency.value=f;
      o.connect(g); g.connect(ac.destination);
      const t = ac.currentTime + n*0.14;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.18,t+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
      o.start(t); o.stop(t+0.55);
    });
  }catch(e){}
}

/* ---------- arrastar (mouse + multi-toque) ---------- */
const drag = new Map();
function clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }

[matheus, manu].forEach(el=>{
  el.addEventListener('pointerdown', e=>{
    const r = el.getBoundingClientRect();
    drag.set(e.pointerId, { el, dx:e.clientX-r.left, dy:e.clientY-r.top });
    el.classList.add('grabbing');
    el.setPointerCapture(e.pointerId);
    hint.classList.add('hide');
    e.preventDefault();
  });
});
document.addEventListener('pointermove', e=>{
  const d = drag.get(e.pointerId); if(!d) return;
  const s = scene.getBoundingClientRect();
  const w = d.el.offsetWidth, h = d.el.offsetHeight;
  d.el.style.left = clamp(e.clientX - s.left - d.dx, 0, s.width - w) + 'px';
  d.el.style.top  = clamp(e.clientY - s.top  - d.dy, 4, s.height - h - 30) + 'px';
  update();
});
function endDrag(e){
  const d = drag.get(e.pointerId); if(!d) return;
  d.el.classList.remove('grabbing');
  drag.delete(e.pointerId);
}
document.addEventListener('pointerup', endDrag);
document.addEventListener('pointercancel', endDrag);

/* ---------- posições iniciais (separados) ---------- */
function place(){
  const w = scene.clientWidth, h = scene.clientHeight;
  const cw = matheus.offsetWidth, ch = matheus.offsetHeight;
  const y = clamp(h*0.46, 110, h-ch-40);
  matheus.style.left  = Math.max(8, w*0.10) + 'px';
  matheus.style.top   = y + 'px';
  manu.style.left = Math.min(w-cw-8, w*0.90-cw) + 'px';
  manu.style.top  = y + 'px';
  update();
}
window.addEventListener('resize', place);
place();
setMsg();

/* corações de fundo */
for(let i=0;i<9;i++){
  const h = document.createElement('div');
  h.className='bg-heart';
  h.textContent = ['💕','💖','💗','❤️'][i%4];
  h.style.left = (Math.random()*100)+'vw';
  h.style.fontSize = (18+Math.random()*22)+'px';
  h.style.animationDuration = (9+Math.random()*9)+'s';
  h.style.animationDelay = (-Math.random()*12)+'s';
  document.body.appendChild(h);
}
</script>
</body>
</html>
